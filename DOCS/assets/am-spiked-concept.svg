<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <!-- AM Monogram — Spiked Edition — Award Winner Concept -->
  <!-- Zero horizontal lines. Every stroke is diagonal. Every end is a point. -->

  <!-- Outer A shape — the main triangle frame -->
  <!-- Inner M zigzag — nested inside sharing outer strokes -->
  <!-- No serif feet — legs taper to sharp points -->

  <g fill="none" stroke="#1A1714" stroke-width="8" stroke-linejoin="miter" stroke-linecap="butt">

    <!-- Outer A — left leg -->
    <polyline points="60,420 200,40 340,420" />

    <!-- Inner A — parallel to outer, creates the double-line effect -->
    <polyline points="90,420 200,72 310,420" />

    <!-- M zigzag — connects between inner legs -->
    <!-- Left inner leg down to M-valley-left, up to M-peak, down to M-valley-right, up to right inner leg -->
    <polyline points="120,360 160,400 200,320 240,400 280,360" />

    <!-- Inner M zigzag parallel — creates double-line effect -->
    <polyline points="128,340 160,372 200,292 240,372 272,340" />

  </g>
</svg>